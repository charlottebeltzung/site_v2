<script>
(function() {
  var desktopWidth = 1100;
  var breakpoint = 768;
  function updateScale() {
    var w = window.innerWidth || document.documentElement.clientWidth;
    var scale = 1;
    if (breakpoint > 0 && w <= breakpoint) {
      scale = 1;
    } else if (w < desktopWidth) {
      scale = w / desktopWidth;
    }
    document.documentElement.style.setProperty('--canvas-scale', String(scale));
  }
  window.addEventListener('resize', updateScale);
  updateScale();
})();
</script>
<script>
(function() {
  var items = document.querySelectorAll('.item-image');
  for (var i = 0; i < items.length; i++) {
    (function(el) {
      if (!el.querySelector('.image-hover')) return;
      el.addEventListener('touchstart', function() { el.classList.add('touching'); }, {passive: true});
      el.addEventListener('touchend', function() { el.classList.remove('touching'); });
      el.addEventListener('touchcancel', function() { el.classList.remove('touching'); });
    })(items[i]);
  }
})();
</script>
